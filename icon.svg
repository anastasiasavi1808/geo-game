<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#141923"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </radialGradient>
    <linearGradient id="globe-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg-grad)"/>
  <!-- Glowing rings -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#globe-grad)" stroke-width="8" opacity="0.15"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#globe-grad)" stroke-width="12" stroke-dasharray="30 20" opacity="0.6"/>
  <!-- Meridians and Equator -->
  <ellipse cx="256" cy="256" rx="90" ry="210" fill="none" stroke="url(#globe-grad)" stroke-width="8" opacity="0.5"/>
  <ellipse cx="256" cy="256" rx="210" ry="90" fill="none" stroke="url(#globe-grad)" stroke-width="8" opacity="0.5"/>
  <line x1="46" y1="256" x2="466" y2="256" stroke="url(#globe-grad)" stroke-width="6" opacity="0.3"/>
  <line x1="256" y1="46" x2="256" y2="466" stroke="url(#globe-grad)" stroke-width="6" opacity="0.3"/>
  <!-- Centered glowing mark -->
  <circle cx="256" cy="256" r="16" fill="url(#globe-grad)"/>
</svg>
